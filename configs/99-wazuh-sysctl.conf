# /etc/sysctl.d/99-wazuh.conf
#
# The Wazuh indexer (OpenSearch) requires a raised memory-map area limit and will
# crash on first start without it. Set and verify this BEFORE deploying the stack.
#
# Apply:  sudo sysctl -p /etc/sysctl.d/99-wazuh.conf
# Verify: cat /proc/sys/vm/max_map_count   -> 262144

vm.max_map_count=262144
